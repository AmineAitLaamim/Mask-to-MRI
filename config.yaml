# ============================================================
# mask-to-mri — Configuration
# ============================================================

data:
  raw_dir: dataset/lgg-mri-segmentation
  processed_dir: data/processed
  synthetic_dir: data/synthetic
  image_size: 256
  seed: 42
  balanced: true
  tumor_ratio: 0.8

model:
  input_channels: 1       # binary mask (condition)
  output_channels: 3      # MRI: R/T1, G/FLAIR (most important), B/T2
  num_filters: 64
  norm: instance          # instance | batch

training:
  epochs: 200
  batch_size: 1
  lr: 0.0002
  beta1: 0.5
  beta2: 0.999
  lambda_l1: 20
  lambda_perceptual: 3
  save_every: 5

paths:
  checkpoints: outputs/checkpoints
  samples: outputs/samples
  metrics: outputs/metrics

med_ddpm:
  timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule: linear          # linear | cosine
  num_filters: 64
  time_emb_dim: 256
  norm: group               # group (DDPM standard)
  attention_resolutions: [16]  # apply attention at 16x16
  epochs: 200
  batch_size: 4
  lr: 0.0002
  warmup_epochs: 5
  ema_decay: 0.995
  save_every: 10
